          <label className="label">Password</label>
          <input className="input" type="password" placeholder="••••••••" value={password}
            onChange={e=>setPassword(e.target.value)} style={{marginBottom:20}} required/>
          <button type="submit" className="btn btn-accent btn-full" disabled={loading}>
            {loading?"⟳ Signing in…":"Sign In"}
          </button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  ADMIN: USER MANAGEMENT SCREEN
// ═══════════════════════════════════════════════════════════════
function UsersScreen({currentUser}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [msg,setMsg]=useState(null);

  // Form state
  const [fName,setFName]=useState("");
  const [fUsername,setFUsername]=useState("");
  const [fPassword,setFPassword]=useState("");
  const [fRole,setFRole]=useState("issue");

  async function loadUsers(){
    setLoading(true);
    try{ const d=await sb.select("app_users","select=*&order=role.asc,display_name.asc"); setUsers(d); }
    catch(e){setMsg({type:"err",text:e.message});}
    finally{setLoading(false);}
  }

  useEffect(()=>{loadUsers();},[]);

  function openAdd(){ setEditUser(null);setFName("");setFUsername("");setFPassword("");setFRole("issue");setShowForm(true);setMsg(null); }
  function openEdit(u){ setEditUser(u);setFName(u.display_name);setFUsername(u.username);setFPassword("");setFRole(u.role);setShowForm(true);setMsg(null); }
  function cancelForm(){ setShowForm(false);setEditUser(null);setMsg(null); }

  async function saveUser(){
    if(!fName.trim()||!fUsername.trim()){setMsg({type:"err",text:"Name and username are required."});return;}
    if(!editUser&&!fPassword.trim()){setMsg({type:"err",text:"Password is required for new users."});return;}
    setLoading(true);setMsg(null);
    try{
      if(editUser){
        // Update existing
        const patch={display_name:fName.trim(),username:fUsername.trim().toLowerCase(),role:fRole};
        if(fPassword.trim()) patch.password_hash=await sha256(fPassword.trim());
        await sb.update("app_users",patch,{id:editUser.id});
        setMsg({type:"ok",text:`User "${fName}" updated.`});
      } else {
        // Create new
        const hash=await sha256(fPassword.trim());
        await sb.insert("app_users",{
          display_name:fName.trim(),
          username:fUsername.trim().toLowerCase(),
          password_hash:hash,
          role:fRole,
          active:true
        });
        setMsg({type:"ok",text:`User "${fName}" created.`});
      }
      setShowForm(false);setEditUser(null);
      loadUsers();
    }catch(e){setMsg({type:"err",text:e.message});}
    finally{setLoading(false);}
  }

  async function toggleActive(u){
    if(u.id===currentUser.id){setMsg({type:"err",text:"You cannot disable your own account."});return;}
    try{
      await sb.update("app_users",{active:!u.active},{id:u.id});
      setMsg({type:"ok",text:`${u.display_name} ${u.active?"disabled":"enabled"}.`});
      loadUsers();
    }catch(e){setMsg({type:"err",text:e.message});}
  }

  async function deleteUser(u){
    if(u.id===currentUser.id){setMsg({type:"err",text:"You cannot delete your own account."});return;}
    if(!window.confirm(`Delete user "${u.display_name}"? This cannot be undone.`))return;
    try{
      await sb.del("app_users",{id:u.id});
      setMsg({type:"ok",text:`User "${u.display_name}" deleted.`});
      loadUsers();
    }catch(e){setMsg({type:"err",text:e.message});}
  }

  const roleGroups = {};
  users.forEach(u=>{ if(!roleGroups[u.role]) roleGroups[u.role]=[]; roleGroups[u.role].push(u); });

  return(
    <div className="page">
      <div className="flex items-center" style={{justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div className="page-title" style={{marginBottom:0}}>User <span>Management</span></div>
        <button className="btn btn-accent" onClick={openAdd}>+ Add User</button>
      </div>

      {msg&&<div className={`alert ${msg.type==="err"?"alert-err":"alert-ok"}`} style={{marginBottom:16}}>{msg.text}</div>}

      {/* ADD / EDIT FORM */}
      {showForm&&(
        <div className="card" style={{marginBottom:20,border:"1px solid var(--accent)",borderRadius:12}}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:18}}>{editUser?"Edit User":"Add New User"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div>
              <label className="label">Display Name</label>
              <input className="input" placeholder="Full Name" value={fName} onChange={e=>setFName(e.target.value)}/>
            </div>
            <div>
              <label className="label">Username</label>
              <input className="input mono" placeholder="login.username" value={fUsername}
                onChange={e=>setFUsername(e.target.value)} autoCapitalize="none"/>
            </div>
            <div>
              <label className="label">{editUser?"New Password (leave blank to keep)":"Password"}</label>
              <input className="input" type="password" placeholder="••••••••" value={fPassword} onChange={e=>setFPassword(e.target.value)}/>
            </div>
            <div>
              <label className="label">Role</label>
              <select className="input" value={fRole} onChange={e=>setFRole(e.target.value)}
                style={{cursor:"pointer"}}>
                {Object.entries(ROLES).map(([k,v])=>(
                  <option key={k} value={k}>{v.label}</option>
                ))}
              </select>
            </div>
          </div>

          {/* Role permissions preview */}
          <div style={{background:"var(--surface2)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12}}>
            <span style={{color:"var(--muted)",fontWeight:700,marginRight:8}}>Access:</span>
            {ROLES[fRole].tabs.map(t=>(
              <span key={t} style={{marginRight:6,padding:"2px 8px",background:"rgba(245,166,35,.15)",color:"var(--accent)",borderRadius:4,fontWeight:700}}>
                {t}
              </span>
            ))}
          </div>

          {msg&&<div className={`alert ${msg.type==="err"?"alert-err":"alert-ok"}`} style={{marginBottom:14}}>{msg.text}</div>}
          <div className="flex gap">
            <button className="btn btn-green" onClick={saveUser} disabled={loading}>
              {loading?"⟳ Saving…":editUser?"✓ Update User":"✓ Create User"}
            </button>
            <button className="btn btn-outline" onClick={cancelForm}>Cancel</button>
          </div>
        </div>
      )}

      {/* USER LIST grouped by role */}
      {loading&&!showForm&&<div className="text-muted">Loading users…</div>}
      {Object.entries(ROLES).map(([roleKey,roleDef])=>{
        const group=roleGroups[roleKey]||[];
        if(!group.length) return null;
        return(
          <div key={roleKey} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{width:10,height:10,borderRadius:"50%",background:roleDef.color,display:"inline-block"}}/>
              <span style={{fontWeight:800,fontSize:13,letterSpacing:".05em",textTransform:"uppercase",color:roleDef.color}}>
                {roleDef.label}
              </span>
              <span style={{fontSize:12,color:"var(--muted)"}}>({group.length} user{group.length>1?"s":""})</span>
            </div>
            <div style={{display:"grid",gap:10}}>
              {group.map(u=>(
                <div key={u.id} className="card" style={{
                  padding:"16px 20px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",
                  opacity:u.active?1:0.5,borderColor:u.active?"var(--border)":"var(--accent2)"
                }}>
                  {/* Avatar */}
                  <div style={{width:40,height:40,borderRadius:"50%",background:roleDef.color+"22",
                    border:`2px solid ${roleDef.color}`,display:"flex",alignItems:"center",
                    justifyContent:"center",fontWeight:800,fontSize:16,color:roleDef.color,flexShrink:0}}>
                    {u.display_name.charAt(0).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15}}>
                      {u.display_name}
                      {u.id===currentUser.id&&<span style={{marginLeft:8,fontSize:11,color:"var(--muted)",fontWeight:600}}>(you)</span>}
                    </div>
                    <div className="mono" style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{u.username}</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    {!u.active&&<span style={{fontSize:11,fontWeight:700,color:"var(--accent2)",padding:"2px 8px",border:"1px solid var(--accent2)",borderRadius:4}}>DISABLED</span>}
                    <button className="btn-sm" onClick={()=>openEdit(u)}>✏ Edit</button>
                    <button className="btn-sm" onClick={()=>toggleActive(u)}
                      style={{borderColor:u.active?"var(--accent2)":"var(--green)",color:u.active?"var(--accent2)":"var(--green)"}}>
                      {u.active?"⊘ Disable":"✓ Enable"}
                    </button>
                    {u.id!==currentUser.id&&(
                      <button className="btn-sm" onClick={()=>deleteUser(u)}
                        style={{borderColor:"var(--accent2)",color:"var(--accent2)"}}>
                        🗑 Delete
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState(null);

  // On login: set tab AND pre-load members cache immediately
  function handleLogin(u){
    setUser(u);
    const allowed=ROLES[u.role]?.tabs||[];
    setTab(allowed[0]||"issue");
    // Load all members into memory now so search is instant later
    membersCache.load();
    membersCache.startRefresh();
  }

  if(!user) return <LoginScreen onLogin={handleLogin}/>;

  const allowedTabs=ROLES[user.role]?.tabs||[];

  const ALL_TABS=[
    {id:"issue",       label:"Issue Tokens"},
    {id:"sweet",       label:"🍬 Sweet Counter"},
    {id:"gift",        label:"🎁 Gift Counter"},
    {id:"dashboard",   label:"📊 Dashboard"},
    {id:"members",     label:"Members"},
    {id:"tokens",      label:"Load Tokens"},
    {id:"users",       label:"👥 Users"},
    {id:"allocations", label:"📦 Allocations"},
  ];

  const visibleTabs=ALL_TABS.filter(t=>allowedTabs.includes(t.id));
  const roleDef=ROLES[user.role];

  if(tab&&!allowedTabs.includes(tab)) setTab(allowedTabs[0]);

  return(
    <div>
      <nav className="nav">
        <div className="nav-brand">KRBECCSL 100Y</div>
        {visibleTabs.map(t=>(
          <div key={t.id} className={`nav-tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</div>
        ))}
        <div className="nav-right">
          <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:12,
            background:roleDef.color+"22",color:roleDef.color,border:`1px solid ${roleDef.color}44`}}>
            {roleDef.label}
          </span>
          <span className="nav-user">{user.display_name}</span>
          <button className="btn-sm" onClick={()=>setUser(null)}>Sign Out</button>
        </div>
      </nav>

      {tab==="issue"       && <IssueScreen      operator={user.display_name}/>}
      {tab==="sweet"       && <DistributionScreen type="sweet" operator={user.display_name}/>}
      {tab==="gift"        && <DistributionScreen type="gift"  operator={user.display_name}/>}
      {tab==="dashboard"   && <DashboardScreen/>}
      {tab==="members"     && <ImportMembersScreen/>}
      {tab==="tokens"      && <LoadTokensScreen/>}
      {tab==="users"       && user.role==="admin" && <UsersScreen currentUser={user}/>}
      {tab==="allocations" && user.role==="admin" && <CounterAllocationScreen currentUser={user}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
